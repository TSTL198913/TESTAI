name: TestAI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  checks: write
  id-token: write

env:
  MAX_PYLINT_ERRORS: 1
  MAX_MYPY_ERRORS: 30
  MAX_BANDIT_ISSUES: 10
  MAX_SAFETY_VULNERABILITIES: 5

jobs:
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install pydantic pydantic-settings --no-cache-dir

      - name: Validate config files
        run: |
          echo "=== Config Validation ==="
          if [ -f src/config.py ]; then
            python -c "import sys; sys.path.insert(0, 'src'); from config import Settings; s = Settings(); print('✅ Settings config validated')"
          else
            echo "⚠️ No config.py found"
          fi

      - name: Validate JSON schema
        run: |
          echo "=== JSON Schema Validation ==="
          python -c "
          import json
          import os
          data_dir = 'tests/data'
          for root, dirs, files in os.walk(data_dir):
              for f in files:
                  if f.endswith('.json'):
                      path = os.path.join(root, f)
                      try:
                          json.load(open(path, encoding='utf-8'))
                          print(f'✅ Valid JSON: {path}')
                      except json.JSONDecodeError as e:
                          print(f'❌ Invalid JSON: {path} - {e}')
                          exit(1)
          "

  lint:
    name: Lint & CI Guard
    runs-on: ubuntu-latest
    needs: config-validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install flake8 pylint mypy --no-cache-dir

      - name: Run Flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Pylint with Error Threshold
        run: |
          pylint src/governance/ src/platform/ src/security/ --fail-under=7.0 --output-format=json > pylint_report.json || true
          python -c "
          import json
          try:
              data = json.load(open('pylint_report.json'))
          except:
              data = []
          errors = [m for m in data if m['type'] == 'error']
          warnings = [m for m in data if m['type'] == 'warning']
          print(f'Pylint: {len(warnings)} warnings, {len(errors)} errors')
          
          if len(errors) > $MAX_PYLINT_ERRORS:
              print(f'❌ Pylint errors ({len(errors)}) exceed threshold ({MAX_PYLINT_ERRORS})')
              for e in errors:
                  print(f'  {e[\"path\"]}:{e[\"line\"]} [{e[\"symbol\"]}] {e[\"message\"]}')
              exit(1)
          elif len(errors) > 0:
              print(f'⚠️ Pylint errors ({len(errors)}) within threshold')
              for e in errors:
                  print(f'  {e[\"path\"]}:{e[\"line\"]} [{e[\"symbol\"]}] {e[\"message\"]}')
          else:
              print('✅ Pylint passed')
          "

      - name: Run MyPy with Error Threshold
        run: |
          mypy src/ --ignore-missing-imports --json-report mypy_report/ 2>&1 || true
          python -c "
          import json
          try:
              data = json.load(open('mypy_report/index.json'))
          except:
              data = {'errorCount': 0}
          error_count = data.get('errorCount', 0)
          print(f'MyPy: {error_count} errors')
          
          if error_count > $MAX_MYPY_ERRORS:
              print(f'❌ MyPy errors ({error_count}) exceed threshold ({MAX_MYPY_ERRORS})')
              exit(1)
          else:
              print('✅ MyPy within threshold')
          "

      - name: Upload Lint Reports
        uses: actions/upload-artifact@v5
        with:
          name: lint-reports
          path: |
            pylint_report.json
            mypy_report/
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install pytest-cov --no-cache-dir

      - name: Run Unit Tests
        run: python -m pytest tests/unit/ -v --tb=short -W error::RuntimeWarning

  integration-tests:
    name: Integration Tests (Fast Track)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir

      - name: Run Fast Track Integration Tests
        run: python -m pytest tests/integration/ -v --tb=short -W error::RuntimeWarning --ignore=tests/integration/test_real_network_extended.py --ignore=tests/integration/test_real_e2e_business.py --ignore=tests/integration/test_http_real.py

  governance-tests:
    name: Governance Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install pytest-cov --no-cache-dir

      - name: Run Governance Tests
        run: python -m pytest tests/governance/ -v --tb=short -W error::RuntimeWarning --cov=src/governance --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: governance-coverage-report
          path: coverage.xml
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install security tools
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install bandit pip-audit safety --no-cache-dir

      - name: Run Bandit Security Scan with Threshold
        run: |
          bandit -r src/ -f json -o bandit_report.json || true
          python -c "
          import json
          import os
          try:
              data = json.load(open('bandit_report.json'))
          except:
              data = {'results': []}
          issue_count = len(data.get('results', []))
          max_issues = int(os.environ.get('MAX_BANDIT_ISSUES', '35'))
          print(f'Bandit: {issue_count} issues found')
          
          if issue_count > max_issues:
              print(f'❌ Bandit issues ({issue_count}) exceed threshold ({max_issues})')
              exit(1)
          else:
              print('✅ Bandit within threshold')
          "

      - name: Run pip-audit Dependency Scan
        run: pip-audit -f json -o pip_audit_report.json || true

      - name: Run Safety Dependency Scan with Threshold
        run: |
          safety check --json --output safety_report.json || true
          python -c "
          import json
          import os
          try:
              data = json.load(open('safety_report.json'))
          except:
              data = {'vulnerabilities': []}
          vuln_count = len(data.get('vulnerabilities', []))
          max_vuln = int(os.environ.get('MAX_SAFETY_VULNERABILITIES', '5'))
          print(f'Safety: {vuln_count} vulnerabilities found')
          
          if vuln_count > max_vuln:
              print(f'❌ Safety vulnerabilities ({vuln_count}) exceed threshold ({max_vuln})')
              exit(1)
          else:
              print('✅ Safety within threshold')
          "

      - name: Upload Security Reports
        uses: actions/upload-artifact@v5
        with:
          name: security-reports
          path: |
            bandit_report.json
            pip_audit_report.json
            safety_report.json
          retention-days: 7

  build-validation:
    name: Build Validation with SBOM
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install build --no-cache-dir

      - name: Build package
        run: python -m build --sdist --wheel .

      - name: Verify build artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -la dist/
          if [ -z "$(ls -A dist/)" ]; then
            echo "❌ No build artifacts found"
            exit 1
          fi

      - name: Install from built package
        run: |
          pip install --no-cache-dir dist/*.whl
          python -c "from src.governance import agent; print('✅ Package installed successfully')"

      - name: Install Syft for SBOM
        uses: anchore/sbom-action/download-syft@v0.16.0

      - name: Generate SBOM for Wheel Package
        run: |
          syft dist/*.whl -o cyclonedx-json=sbom_wheel.json
          syft dist/*.whl -o spdx-json=sbom_wheel_spdx.json
          echo "✅ SBOM generated for wheel package"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Wheel Package with Cosign
        run: |
          cosign sign-blob --yes --output-signature wheel.sig --output-certificate wheel.crt dist/*.whl
          echo "✅ Wheel package signed with Cosign"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-artifacts
          path: |
            dist/
            sbom_wheel.json
            sbom_wheel_spdx.json
            wheel.sig
            wheel.crt
          retention-days: 7

  docker-build:
    name: Docker Build with SBOM & Signing
    runs-on: ubuntu-latest
    needs: build-validation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t testai:ci .

      - name: Verify Docker image
        run: |
          docker image inspect testai:ci | grep -q "testai:ci"
          echo "✅ Docker image built successfully"

      - name: Install Syft for SBOM
        uses: anchore/sbom-action/download-syft@v0.16.0

      - name: Generate SBOM for Docker Image
        run: |
          syft docker.io/library/testai:ci -o cyclonedx-json=sbom_docker.json
          syft docker.io/library/testai:ci -o spdx-json=sbom_docker_spdx.json
          echo "✅ SBOM generated for Docker image"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image with Cosign (Local)
        run: |
          docker save testai:ci -o testai_ci.tar
          cosign sign-blob --yes --output-signature docker_image.sig --output-certificate docker_image.crt testai_ci.tar
          echo "✅ Docker image signed with Cosign (local tar)"

      - name: Upload Docker artifacts
        uses: actions/upload-artifact@v5
        with:
          name: docker-artifacts
          path: |
            sbom_docker.json
            sbom_docker_spdx.json
          retention-days: 7

  environment-check:
    name: Environment Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python version
        run: |
          python --version
          python -c "import sys; print(f'Python version: {sys.version}')"
          if ! python -c "import sys; assert sys.version_info >= (3,10), 'Python version too old'" 2>/dev/null; then
            echo "❌ Python version check failed"
            exit 1
          fi

      - name: Check environment variables
        run: |
          echo "=== Environment Variables ==="
          echo "CI: ${CI}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS}"
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}"

      - name: Verify network connectivity
        run: |
          echo "=== Network Connectivity ==="
          curl -s -o /dev/null -w "GitHub: %{http_code}\n" https://github.com
          curl -s -o /dev/null -w "PyPI: %{http_code}\n" https://pypi.org
          curl -s -o /dev/null -w "DeepSeek: %{http_code}\n" https://api.deepseek.com

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [config-validation, lint, unit-tests, integration-tests, governance-tests, security-scan, build-validation, docker-build, environment-check]
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v5
        with:
          name: governance-coverage-report
          path: reports/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check coverage threshold
        run: |
          if [ ! -f reports/coverage.xml ]; then
            echo "❌ coverage.xml not found"
            exit 1
          fi
          coverage_percent=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate'])
          print(f'{line_rate * 100:.1f}')
          ")
          echo "Coverage: $coverage_percent%"
          python -c "
          coverage_percent = float('$coverage_percent')
          if coverage_percent < 70:
              print(f'❌ Coverage {coverage_percent}% below 70% threshold')
              exit(1)
          else:
              print('✅ Coverage meets threshold')
          "

      - name: Quality Gate Summary
        run: |
          echo "=== Quality Gate Summary ==="
          echo "✅ All prerequisite checks passed"
          echo "📋 Config Validation: Passed"
          echo "📊 Lint: Passed"
          echo "🧪 Unit Tests: Passed"
          echo "🔗 Integration Tests (Fast Track): Passed"
          echo "🏛️ Governance Tests: Passed"
          echo "🛡️ Security Scan: Passed"
          echo "📦 Build Validation with SBOM: Passed"
          echo "🐳 Docker Build with Signing: Passed"
          echo "🌐 Environment Check: Passed"
          echo "📈 Coverage: Passed"

      - name: Post to GitHub Summary
        run: |
          echo "## TestAI Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY
          echo "- Config Validation: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & CI Guard: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests (Fast Track): ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Governance Tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation with SBOM: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build with Signing: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Environment Check: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: ✅" >> $GITHUB_STEP_SUMMARY