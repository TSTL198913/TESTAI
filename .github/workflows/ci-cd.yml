name: TestAI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
      fail-fast: false

    env:
      MONGO_URI: mongodb://localhost:27017/testai
      DEEPSEEK_API_KEY: test-key-for-ci

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run test suite with coverage
      run: |
        python -m pytest tests/ --ignore=tests/governance/test_tracker.py \
          -v --tb=short --cov=src --cov-report=term --cov-report=html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 7

  security:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017/testai
      DEEPSEEK_API_KEY: test-key-for-ci

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run bandit security scan
      run: |
        bandit -r src/ -f json -o security_scan_report.json
        cat security_scan_report.json

    - name: Run pip-audit dependency scan
      run: |
        pip-audit -f json

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-report
        path: security_scan_report.json
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017/testai
      DEEPSEEK_API_KEY: test-key-for-ci

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run isort
      run: |
        isort --check --diff src/ tests/

    - name: Run black
      run: |
        black --check --diff src/ tests/

    - name: Run pylint
      run: |
        pylint src/ --disable=all --enable=E,F,W --output-format=text

    - name: Run mypy
      run: |
        mypy src/ --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    needs: [test, security, lint]
    env:
      MONGO_URI: mongodb://localhost:27017/testai
      DEEPSEEK_API_KEY: test-key-for-ci

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: |
        python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: testai-package
        path: dist/
        retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, security, lint]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha,prefix=,suffix=,format=short
          type=ref,event=branch
          type=ref,event=pr

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
    - name: Deploy to preview environment
      id: deploy
      run: |
        echo "preview-url=http://preview.testai.local" >> $GITHUB_OUTPUT
        echo "Deploying preview environment..."

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    environment:
      name: staging
      url: http://staging.testai.local
    steps:
    - name: Deploy to staging environment
      run: |
        echo "Deploying to staging environment..."

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    environment:
      name: production
      url: http://production.testai.local
    steps:
    - name: Deploy to production environment
      run: |
        echo "Deploying to production environment..."

    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."