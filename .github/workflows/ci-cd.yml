name: TestAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install pydantic --no-cache-dir
          
      - name: Validate config files
        run: |
          echo "=== Config Validation ==="
          if [ -f src/config.py ]; then
            python -c "import sys; sys.path.insert(0, 'src'); from config import Settings; s = Settings(); print('✅ Settings config validated')"
          else
            echo "⚠️ No config.py found"
          fi

  lint:
    name: Lint & CI Guard
    runs-on: ubuntu-latest
    needs: config-validation
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install flake8 pylint mypy --no-cache-dir
          
      - name: Run Flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Run Pylint
        run: pylint src/governance/ src/platform/ src/security/ --fail-under=7.0 || true
        
      - name: Run MyPy
        run: mypy src/ --ignore-missing-imports || true

  test:
    name: Governance Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install pytest-cov --no-cache-dir
          
      - name: Run governance tests with coverage
        run: |
          python -m pytest tests/governance/ -v --cov=src/governance --cov-report=xml --cov-fail-under=70 -W error::RuntimeWarning
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: governance-coverage-report
          path: coverage.xml
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          
      - name: Run Integration Tests
        run: python -m pytest tests/integration/ -v --tb=short -W error::RuntimeWarning --ignore=tests/integration/test_real_network_extended.py --ignore=tests/integration/test_real_e2e_business.py --ignore=tests/integration/test_http_real.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install security tools
        run: |
          pip install bandit pip-audit safety
          
      - name: Run Bandit Security Scan
        run: bandit -r src/ -f json -o security_scan.json --exit-zero
        
      - name: Run pip-audit Dependency Scan
        run: pip-audit -f json -o dependency_scan.json || true
        
      - name: Run Safety Dependency Scan
        run: safety check --json --output safety_scan.json || true
        
      - name: Upload Security Reports
        uses: actions/upload-artifact@v5
        with:
          name: security-reports
          path: |
            security_scan.json
            dependency_scan.json
            safety_scan.json
          retention-days: 7

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install build tools
        run: |
          pip install --upgrade pip --no-cache-dir
          pip install build --no-cache-dir
          
      - name: Build package
        run: python -m build --sdist --wheel .
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  quality-gate:
    runs-on: ubuntu-latest
    needs: [test, integration-test, security-scan, build-validation]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download coverage reports
        uses: actions/download-artifact@v5
        with:
          name: governance-coverage-report
          path: reports/
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Check coverage threshold
        run: |
          if [ ! -f reports/coverage.xml ]; then
            echo "❌ coverage.xml not found"
            exit 1
          fi
          coverage_percent=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('reports/coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate'])
          print(f'{line_rate * 100:.1f}')
          ")
          echo "Coverage: $coverage_percent%"
          if (( $(echo "$coverage_percent < 70" | bc -l) )); then
            echo "❌ Coverage $coverage_percent% below 70% threshold"
            exit 1
          else
            echo "✅ Coverage meets threshold"
          fi
          
      - name: Quality Gate Summary
        run: |
          echo "=== Quality Gate Summary ==="
          echo "✅ All prerequisite checks passed"
          echo "📋 Config Validation: Passed"
          echo "📊 Lint: Passed"
          echo "🧪 Governance Tests: Passed"
          echo "🔗 Integration Tests: Passed"
          echo "🛡️ Security Scan: Passed"
          echo "📦 Build Validation: Passed"
          echo "📈 Coverage: Passed"
          
      - name: Post to GitHub Summary
        run: |
          echo "## TestAI Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY
          echo "- Config Validation: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Governance Tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: ✅" >> $GITHUB_STEP_SUMMARY