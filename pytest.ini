[pytest]
# 修复 PytestUnknownMarkWarning: 明确告知 pytest 使用 asyncio 插件
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 修复 PytestCollectionWarning: 明确定义测试文件的扫描规则
# 只扫描以 test_ 开头的模块，以 test_ 开头的函数，以及以 Test 开头的类
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# 测试超时配置
# 单个测试用例最大执行时间（秒）
timeout = 30

# 限制扫描路径，避免 Windows 系统目录权限问题
testpaths = tests/

# 将警告转为错误 - CI质量门禁
# 关键警告转为错误，确保代码质量
filterwarnings =
    error::RuntimeWarning
    default::DeprecationWarning
    default::PendingDeprecationWarning
    error::SyntaxWarning
    error::ImportWarning
    default::ResourceWarning
    ignore::pytest.PytestCollectionWarning
    ignore::pytest.PytestUnraisableExceptionWarning