version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: testai-api-prod
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-testai_prod}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-10.0}
      - HTTP_MAX_CONNECTIONS=${HTTP_MAX_CONNECTIONS:-200}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - SECRET_KEY=${PROD_SECRET_KEY}
      - JWT_SECRET_KEY=${PROD_JWT_SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      - mongo
      - redis
    networks:
      - testai-network
    volumes:
      - ./data/prod:/app/data
      - ./reports/prod:/app/reports
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
      replicas: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: testai-worker-prod
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=8
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-testai_prod}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    depends_on:
      - mongo
      - redis
    networks:
      - testai-network
    volumes:
      - ./data/prod:/app/data
      - ./reports/prod:/app/reports
    restart: always
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
      replicas: 2

  mongo:
    image: mongo:6.0
    container_name: testai-mongo-prod
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-testai_prod}
    networks:
      - testai-network
    volumes:
      - mongo-data-prod:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.0-alpine
    container_name: testai-redis-prod
    ports:
      - "6379:6379"
    networks:
      - testai-network
    volumes:
      - redis-data-prod:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: testai-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-prod:/prometheus
    networks:
      - testai-network
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    container_name: testai-grafana-prod
    ports:
      - "3000:3000"
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - testai-network
    restart: always
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: testai-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./monitoring/nginx/ssl:/etc/nginx/ssl
    networks:
      - testai-network
    restart: always
    depends_on:
      - api

networks:
  testai-network:
    driver: bridge

volumes:
  mongo-data-prod:
  redis-data-prod:
  prometheus-data-prod:
  grafana-data-prod: