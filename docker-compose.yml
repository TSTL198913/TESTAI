version: '3.8'

services:
  api:
    build: .
    container_name: testai-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-testai}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-10.0}
      - HTTP_MAX_CONNECTIONS=${HTTP_MAX_CONNECTIONS:-100}
    depends_on:
      - mongo
      - redis
    networks:
      - testai-network
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build: .
    container_name: testai-worker
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-testai}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - mongo
      - redis
    networks:
      - testai-network
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    container_name: testai-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-testai}
    networks:
      - testai-network
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.0-alpine
    container_name: testai-redis
    ports:
      - "6379:6379"
    networks:
      - testai-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  testai-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data: